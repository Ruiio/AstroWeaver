# configs/config.yaml

# API密钥和认证信息（支持环境变量替换）
api_keys:
  ali_key: "${ASTROWEAVER_ALI_KEY}"
  zhipu_key: "${ASTROWEAVER_ZHIPU_KEY}"
  nvidia_key: "${ASTROWEAVER_NVIDIA_KEY}"
  deepseek_key: "${ASTROWEAVER_DEEPSEEK_KEY}"
  llm: "${ASTROWEAVER_LLM_KEY}" # 默认LLM API密钥（向后兼容）
  X_API_KEY: "${ASTROWEAVER_X_API_KEY}" # bochaai API密钥
  closeai_key: "${ASTROWEAVER_CLOSEAI_KEY}"
  serper_key: "${ASTROWEAVER_SERPER_KEY}" # Serper API Key
# 文件和目录路径
paths:
  input_file: "data/input/astroEntity.xlsx"
  output_dir: "data/output"
  vector_db_path: "data/vectordb" # ChromaDB数据存储路径
  audited_triples_dir: "data/output/audited_triples" # 审核后的三元组保存目录
# 审核器配置
auditor:
  confidence_threshold: 1 # 置信度阈值，高于此值的三元组被认为是高质量的
  enable_vector_similarity: true # 是否启用向量相似度检查（需要向量数据库）
  enable_llm_validation: true # 是否启用LLM验证（更准确但更慢）

# 置信度配置
confidence:
  default_extraction: 0.5 # 信息抽取的默认置信度，对于llm不提供置信度情况下
  default_normalization: 0.5 # 规范化的默认置信度（）
  min_confidence: 0.9 # 最小置信度阈值（低于最小置信度的三元组将直接去除）
  audit_threshold: 0.9 # 审核置信度阈值（分割低置信度和高置信度的三元组）
# 模型配置
llm:
  provider: "deepseek"
  # 阿里云配置
  ali:
    base_url: "https://dashscope.aliyuncs.com/compatible-mode/v1"
    base_model: "deepseek-v3.1"
    extraction_model: "deepseek-v3.1"
    judge_model: "deepseek-v3.1"
  # 智谱AI配置
  zhipu:
    base_url: "https://open.bigmodel.cn/api/paas/v4"
    base_model: "glm-4.7"
    extraction_model: "glm-4.7"
    judge_model: "glm-4.7"
  # NVIDIA（OpenAI兼容）配置
  nvidia:
    base_url: "https://integrate.api.nvidia.com/v1"
    base_model: "meta/llama-3.2-3b-instruct"
    extraction_model: "meta/llama-3.2-3b-instruct"
    judge_model: "meta/llama-3.2-3b-instruct"
  closeai:
    base_url: "https://api.openai-proxy.org/v1"
    base_model: "gemini-3-pro-preview"
    extraction_model: "gemini-3-pro-preview"
    judge_model: "gemini-3-pro-preview"
  # DeepSeek（OpenAI兼容）配置
  deepseek:
    base_url: "https://api.deepseek.com"
    base_model: "deepseek-chat"
    extraction_model: "deepseek-chat"
    judge_model: "deepseek-chat"
  # 向后兼容的配置（将被弃用）
  base_url: "https://dashscope.aliyuncs.com/compatible-mode/v1" # LLM API的URL
  base_model: "deepseek-v3"
  extraction_model: "deepseek-v3" # 用于关系抽取的模型
  judge_model: "deepseek-v3"      # 用于规范化判断的模型

embedding:
  api_url: "http://127.0.0.1:8005" # 本地嵌入模型服务URL（tools/local_services/embedding_api.py）
neo4j:
  uri: "bolt://localhost:7687"
  user: "neo4j"
  password: "${ASTROWEAVER_NEO4J_PASSWORD}"
# 向量数据库配置
vector_db:

  similarity_threshold: 0.3 # 用于筛选候选者的相似度阈值
  top_k: 5                   # 检索最相似的候选者数量
  relation_collection: "relations"
  entity_collection: "entities"

# 管道运行配置
pipeline:
  num_workers: 2 # 并行处理实体的线程数
  skip_audit: false # 是否跳过审核阶段
  save_triples_to_file: true # 是否将三元组保存到文件
  enable_memory_safe_mode: true # 是否启用内存安全模式

# 图谱冲突融合配置（V1）
graph_conflict:
  enabled: true
  # CS = w1*S + w2*Normalize(T)
  w1: 0.7
  w2: 0.3
  coexist_score_delta: 0.08
  numeric_tolerance_ratio: 0.03
  authority_weights:
    simbad: 1.00
    academic_paper: 0.90
    wikipedia: 0.70
    web_news: 0.50
    general_web: 0.60

# 性能优化配置
performance:
  max_concurrent_llm_calls: 100 # 适度提高并发数以加快处理速度
  batch_size: 10 # 适度增加批次大小
  llm_timeout: 120 # 缩短单个LLM调用超时时间
  max_retries: 3 # 最大重试次数
  canonicalization_timeout: 9999999 # 增加规范化总超时时间到40分钟
  extraction_concurrent_limit: 20 # 抽取阶段并发限制，避免触发429限流

#minerU配置
minerU:
    api_url: "http://127.0.0.1:30924/file_parse"

#文本切块大小配置
chunk:
  chunk_size: 1024
  chunk_overlap: 80

# Web 搜索配置
web_search:
  provider: "serper" # serper | open_websearch
  serper_url: "https://google.serper.dev/search"
  open_websearch_url: "http://127.0.0.1:3001/mcp"
  engines: ["bing"]
